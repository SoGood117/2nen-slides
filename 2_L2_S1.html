    <script>
        let currentSlide = 0;
        function makeSlashable(container, html) {
            container.innerHTML = html;
            const walk = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            while (node = walk.nextNode()) { textNodes.push(node); }
            textNodes.forEach(textNode => {
                const parent = textNode.parentNode;
                const text = textNode.textContent;
                const tokens = text.split(/(\s+)/);
                const fragment = document.createDocumentFragment();
                tokens.forEach(token => {
                    if (/\s+/.test(token)) {
                        const span = document.createElement('span');
                        span.className = 'slashable-char slashable-space';
                        span.innerHTML = '&nbsp;';
                        span.onclick = (e) => { e.stopPropagation(); span.classList.toggle('slash-mark'); };
                        fragment.appendChild(span);
                    } else if (token.length > 0) {
                        const wordWrapper = document.createElement('span');
                        wordWrapper.className = 'word-wrapper';
                        token.split('').forEach(char => {
                            const charSpan = document.createElement('span');
                            charSpan.className = 'slashable-char';
                            charSpan.textContent = char;
                            charSpan.onclick = (e) => { e.stopPropagation(); charSpan.classList.toggle('slash-mark'); };
                            wordWrapper.appendChild(charSpan);
                        });
                        fragment.appendChild(wordWrapper);
                    }
                });
                parent.replaceChild(fragment, textNode);
            });
        }
        function createWordCard(word, containerId) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = "bg-gray-700/50 p-5 rounded-2xl border-2 border-gray-600 text-center cursor-pointer hover:bg-gray-600 transition shadow-lg flex flex-col items-center justify-center h-[200px]";
            div.onclick = function() { this.querySelector('.ja-text').classList.toggle('opacity-0'); };
            div.innerHTML = `
                <p class="text-3xl font-bold mb-4">${word.en}</p>
                <p class="ja-text text-3xl text-yellow-400 opacity-0 transition-opacity font-bold">${word.ja}</p>
            `;
            container.appendChild(div);
        }

            document.getElementById('warmup-a-base').innerText = SLIDE_DATA.warmup.answerBase;
            const readingStatic = document.getElementById('reading-content-static');
            readingStatic.innerHTML = '';
            SLIDE_DATA.reading.forEach(line => {
                const p = document.createElement('p');
                p.className = "mb-6";
                const html = line.replace(/\{([^}]+)\}/g, '<span class="highlight-static">$1</span>');
                makeSlashable(p, html);
                readingStatic.appendChild(p);
            });
            const readingQuiz = document.getElementById('reading-content-quiz');
            readingQuiz.innerHTML = '';
            SLIDE_DATA.reading.forEach(line => {
                const p = document.createElement('p');
                p.className = "mb-6";
                p.innerHTML = line.replace(/\{([^}]+)\}/g, '<span class="hidden-answer" onclick="this.classList.toggle(\'show\')">$1</span>');
                readingQuiz.appendChild(p);
            });
            const checkContent = document.getElementById('check-content');
            checkContent.innerHTML = '';
            SLIDE_DATA.checks.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl border border-orange-100 w-full";
                let qHtml = item.q.replace(/\{([^}]+)\}/g, '<span class="hidden-answer" onclick="this.classList.toggle(\'show\')">$1</span>');
                let html = `<p class="font-bold">${qHtml}</p>`;
                if(item.sub) {
                    let subHtml = item.sub.replace(/\{([^}]+)\}/g, '<span class="hidden-answer" onclick="this.classList.toggle(\'show\')">$1</span>');
                    html += `<p class="mt-2 ml-10 text-gray-600 font-medium">${subHtml}</p>`;
                }
                div.innerHTML = html;
                checkContent.appendChild(div);
            });
            const transContent = document.getElementById('translation-content');
            transContent.innerHTML = '';
            SLIDE_DATA.translationPhrases.forEach(phrase => {
                const card = document.createElement('div');
                card.className = "phrase-card";
                card.onclick = () => card.classList.toggle('active');
                card.innerHTML = `
                    <div class="phrase-en">${phrase.en}</div>
                    <div class="phrase-ja">${phrase.ja}</div>
                `;
                transContent.appendChild(card);
            });
            // word-grid replaced by KEY WORDS slide
            document.getElementById('new-words-grid').innerHTML = '';
            SLIDE_DATA.newWords.forEach(word => createWordCard(word, 'new-words-grid'));
            const optDiv = document.getElementById('dialogue-options');
            optDiv.innerHTML = '';
            SLIDE_DATA.dialogue.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-green-200 p-4 rounded-xl font-bold hover:bg-green-500 hover:text-white transition text-xl shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => document.getElementById('target-word').innerText = opt;
                optDiv.appendChild(btn);
            });
            updateSlideDisplay();
        }
        function revealAllQuiz() {
            const answers = document.querySelectorAll('#reading-content-quiz .hidden-answer');
            const anyHidden = Array.from(answers).some(a => !a.classList.contains('show'));
            answers.forEach(a => a.classList.toggle('show', anyHidden));
        }
        function updateSlideDisplay() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((s, i) => s.classList.toggle('active', i === currentSlide));
            document.getElementById('slide-indicator').innerText = `${currentSlide + 1} / ${slides.length}`;
        }
        function nextSlide() { if (currentSlide < 8) { currentSlide++; updateSlideDisplay(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; updateSlideDisplay(); } }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });
        window.onload = initApp;
    </script>
</body>
</html>
